<IfModule mod_deflate.c>
    # Activar compresión para estos tipos de contenido
    AddOutputFilterByType DEFLATE text/html
    AddOutputFilterByType DEFLATE text/css
    AddOutputFilterByType DEFLATE text/javascript
    AddOutputFilterByType DEFLATE application/javascript
    AddOutputFilterByType DEFLATE application/json
    AddOutputFilterByType DEFLATE text/xml
    AddOutputFilterByType DEFLATE text/plain

    # Excluir archivos ya comprimidos (imágenes, video, zip)
    SetEnvIfNoCase Request_URI \.(?:gif|jpe?g|png|webp|svg)$ no-gzip
    SetEnvIfNoCase Request_URI \.(?:mp4|avi|mkv|mov)$ no-gzip
    SetEnvIfNoCase Request_URI \.(?:zip|gz|bz2|rar)$ no-gzip

    # Nivel de compresión: 1 (rápido) - 9 (máximo). 6 es buen balance
    DeflateCompressionLevel 6

    # Agregar cabecera Vary para compatibilidad con proxies
    Header append Vary Accept-Encoding
</IfModule>
