<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset="UTF-8">
    <title>Parcial Servicios Telemáticos</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f4f8; }
        .card { 
            background: white; 
            max-width: 600px; 
            margin: 60px auto;
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px #0003; 
        }
        h1 { color: #1F4E79; }
        .badge { 
            background: #2E75B6; 
            color: white; 
            padding: 8px 16px;
            border-radius: 20px; 
            display: inline-block; 
        }
    </style>
</head>
<body>
    <div class='card'>
        <h1> Parcial Servicios Telemáticos</h1>

        <p><strong>Nombre:</strong> SEBASTIAN DELGADO</p>
        <p><strong>Servidor:</strong> Apache 2 + mod_deflate (gzip)</p>
        <span class='badge'>✔ Compresión activa</span>
    </div>
</body>
</html>
